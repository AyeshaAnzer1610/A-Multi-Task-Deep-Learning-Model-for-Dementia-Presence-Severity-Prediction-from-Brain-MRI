# configs/default.yaml
data_root:    "data/AlzheimerDataset"
image_size:   224
batch_size:   32
num_workers:  2
val_fold:     1
head_lr:      3.0e-4
backbone_lr:  3.0e-5
weight_decay: 1.0e-4
max_epochs:          25
freeze_epochs:       5
early_stop_patience: 5
grad_clip_norm:      1.0
dropout:      0.35
se_reduction: 8
loss_alpha:         0.6
consistency_weight: 0.05
t1:   0.45
t2:   0.55
tbin: 0.48
seed: 42
